name: 'Drupal Forge build platform image'
description: 'Builds and pushes a platform image tagged by branch name to Docker Hub for a Drupal Forge template.'
author: 'Drupal Forge'
branding:
  icon: 'package'
  color: 'blue'
inputs:
  dockerhub_username:
    description: 'Docker Hub username'
    required: true
  dockerhub_token:
    description: 'Docker Hub token'
    required: true
  openai_key:
    description: 'OpenAI API Key'
    required: true
  dp_ai_virtual_key:
    description: 'DevPanel AI Virtual Key'
    required: false
  image_repo:
    description: 'Docker Hub image repository'
    required: false
  files_to_hash:
    description: 'List of files to check for changes (space or newline separated). Relative paths are assumed to be in app root. Defaults to composer.lock if not provided.'
    required: false
  cached_hash:
    description: 'Previously cached files hash for comparison.'
    required: false
  build_platform:
    description: 'Target platform for the build. Defaults to linux/amd64.'
    required: false
runs:
  using: "composite"
  steps:

    - name: Check out code
      uses: actions/checkout@v4
      with:
        path: app

    - name: Check if action repo already checked out
      id: check_action_repo
      run: |
        if [ -d "docker_publish_action" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Check out Dockerfile
      if: steps.check_action_repo.outputs.exists != 'true'
      uses: actions/checkout@v4
      with:
        repository: drupalforge/docker_publish_action
        ref: ${{ github.action_ref }}
        path: docker_publish_action

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Try Docker Buildx Cloud builder
      if: inputs.build_platform && inputs.build_platform != 'linux/amd64'
      id: buildx_cloud
      continue-on-error: true
      uses: docker/setup-buildx-action@v3
      with:
        driver: cloud
        endpoint: "${{ inputs.dockerhub_username }}/github"

    - name: Fall back to docker-container builder if cloud did not succeed
      if: steps.buildx_cloud.outcome != 'success'
      uses: docker/setup-buildx-action@v3

    - name: Set IMAGE_REPO variable
      run: |
        echo "IMAGE_REPO=${{ inputs.image_repo || github.repository }}" >> $GITHUB_ENV
      shell: bash

    - name: Generate .dockerignore in build context
      run: |
        sed "s|__APP_ROOT__|/var/www/html|g" docker_publish_action/.dockerignore.template > app/.dockerignore
      shell: bash

    - name: Get CMD from base image and generate Dockerfile
      id: prepare_dockerfile
      run: |
        BASE_IMAGE="devpanel/php:8.3-base-ai"
        docker pull $BASE_IMAGE
        # Get CMD as JSON array
        CMD_JSON=$(docker inspect $BASE_IMAGE | jq -c '.[0].Config.Cmd')
        echo "Base image CMD: $CMD_JSON"
        # Generate Dockerfile from Dockerfile.template
        sed "s|__BASE_CMD__|$CMD_JSON|" docker_publish_action/Dockerfile.template > docker_publish_action/Dockerfile
        tail -5 docker_publish_action/Dockerfile
      shell: bash

    - name: Build image (no push, load to local Docker)
      id: build_image
      uses: docker/build-push-action@v6
      env:
        BUILDKIT_PROGRESS: plain
      with:
        context: ./app
        build-contexts: |
          docker_publish_action=./docker_publish_action
        file: ./docker_publish_action/Dockerfile
        platforms: ${{ inputs.build_platform || 'linux/amd64' }}
        build-args: |
          APP_ROOT=/var/www/html
          APACHE_RUN_USER=www
          APACHE_RUN_GROUP=www
        push: false
        load: true
        cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache-${{ github.ref_name }}
        cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:buildcache-${{ github.ref_name }},mode=max

    - name: Docker system prune (cleanup)
      run: |
        docker system prune -af --filter "label!=keep"
        docker builder prune -af
      shell: bash

    - name: Check disk space and create swap file (increase memory)
      if: runner.os == 'Linux'
      run: |
        AVAIL=$(df --output=avail / | tail -1)
        # AVAIL is in KB, 3GB = 3 * 1024 * 1024 KB
        if [ "$AVAIL" -gt $((3 * 1024 * 1024)) ]; then
          sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
        else
          echo "Not enough disk space for swap. Skipping swap creation."
        fi
        free -h || true
      shell: bash

    - name: Run init.sh in container with MySQL
      id: post_build_init
      run: |
        # Generate .env from env.template, replacing placeholders with dynamic values
        sed -e "s|__OPENAI_KEY__|${{ inputs.openai_key }}|g" \
          -e "s|__DP_AI_VIRTUAL_KEY__|${{ inputs.dp_ai_virtual_key || '' }}|g" \
          -e "s|__DP_APP_ID__|${{ inputs.image_repo || github.repository }}|g" \
          docker_publish_action/.env.template > docker_publish_action/.env

        WEBSERVER=$(docker run -dq \
          --network ${NETWORK:-bridge} \
          --add-host=milvus:127.0.0.1 \
          --add-host=etcd:127.0.0.1 \
          --add-host=minio:127.0.0.1 \
          --add-host=attu:127.0.0.1 \
          --env-file docker_publish_action/.env \
          ${{ steps.build_image.outputs.imageid }})
        echo "WEBSERVER=$WEBSERVER" >> $GITHUB_ENV
        docker exec $WEBSERVER sh -c '$APP_ROOT/.devpanel/custom_package_installer.sh'
        echo "WAIT FOR SERVICES TO BE HEALTHY"
        docker exec $WEBSERVER sh -c '$APP_ROOT/.devpanel/wait-for-services.sh'
        echo "INSTALL DRUPAL"
        docker exec $WEBSERVER sh -c '$APP_ROOT/.devpanel/init.sh'
      shell: bash

    - name: Hash current files
      id: hash_files
      env:
        FILES_TO_HASH: ${{ inputs.files_to_hash || 'composer.lock' }}
      run: |
        echo "HASH FILES"
        APP_ROOT=$(docker exec $WEBSERVER bash -c 'echo $APP_ROOT')
        HASH=""
        if [ -n $FILES_TO_HASH ]; then
          EXISTING_FILES=""
          # Use eval and set to handle quoted filenames with spaces
          eval set -- $FILES_TO_HASH
          for f; do
            if [ ${f:0:1} != / ]; then
              # Check relative to $APP_ROOT
              f=$APP_ROOT/$f
            fi
            echo "Hashing $f to check for changes."
            if docker exec $WEBSERVER bash -c "test -f '$f'"; then
              if [ -n $EXISTING_FILES ]; then
                f=$'\n'$f
              fi
              EXISTING_FILES=$EXISTING_FILES$f
            fi
          done
          if [ -n $EXISTING_FILES ]; then
            EXISTING_FILES=$(echo $EXISTING_FILES | sort)
            for f in $EXISTING_FILES; do
              FILE_HASH=$(docker exec $WEBSERVER bash -c "sha256sum \"$f\" | awk '{print \$1}'")
              if [ -z $HASH ]; then
                HASH=$FILE_HASH
              else
                HASH=$(printf "%s%s" $HASH $FILE_HASH | sha256sum | awk '{print $1}')
              fi
            done
          fi
        fi
        echo "hash=$HASH" >> $GITHUB_OUTPUT
      shell: bash

    - name: Compare current and previouse file hashes
      if: github.event_name != 'push' && steps.hash_files.outputs.hash != ''
      id: compare_hash
      env:
        CACHED_HASH: ${{ inputs.cached_hash }}
        HASH: ${{ steps.hash_files.outputs.hash }}
      run: |
        echo "CHECK FOR CHANGES"
        if [ -n ${CACHED_HASH+x} ] && [ $CACHED_HASH == $HASH ]; then
          echo "Hash unchanged, skipping rest of the action."
          echo "skip=true" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Save database and files dumps
      if: steps.compare_hash.outputs.skip != 'true'
      run: |
        echo "DUMPS DATABASE + STATIC FILE"
        docker exec $WEBSERVER bash -c '$APP_ROOT/.devpanel/create_quickstart.sh'
        docker exec $WEBSERVER bash -c 'rm $APP_ROOT/.devpanel/dumps/files.tgz'
      shell: bash

    - name: Cleanup sensitive environment variables
      if: steps.compare_hash.outputs.skip != 'true'
      run: |
        docker exec $WEBSERVER bash -c '
          if [ -f docker_publish_action/.env ]; then
            grep -v "^#" docker_publish_action/.env | cut -d= -f1 | while IFS= read -r var; do
              unset "$var"
            done
          fi
        '
      shell: bash

    - name: Commit and push the container state to Docker Hub
      if: steps.compare_hash.outputs.skip != 'true'
      id: push_image
      run: |
        docker commit $WEBSERVER $IMAGE_REPO:${{ github.ref_name }}
        docker push --quiet $IMAGE_REPO:${{ github.ref_name }}
        IMAGE=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_REPO:${{ github.ref_name }})
        echo "image=$IMAGE" >> $GITHUB_OUTPUT
      shell: bash
outputs:
  hash:
    description: 'Files hash'
    value: ${{ steps.hash_files.outputs.hash }}
  skip:
    description: 'Skip manifest generation'
    value: ${{ steps.compare_hash.outputs.skip }}
  image:
    description: 'Image pushed for this platform'
    value: ${{ steps.push_image.outputs.image }}
