name: Docker build and push workflow
on:
  workflow_call:
    inputs:
      dockerhub_username:
        description: 'Docker Hub username'
        required: true
        type: string
      image_repo:
        description: 'Docker Hub image repository. Defaults to the repository name if not provided.'
        required: false
        type: string
      files_to_hash:
        description: 'List of files to check for changes (space or newline separated). Defaults to composer.lock if not provided.'
        required: false
        type: string
    secrets:
      dockerhub_token:
        description: 'Docker Hub token'
        required: true
      dp_ai_virtual_key:
        description: 'DevPanel AI Virtual Key'
        required: false
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [linux/amd64, linux/arm64]
    outputs:
      digest_json_amd64: ${{ steps.publish.outputs.digest_json }}
      digest_json_arm64: ${{ steps.publish.outputs.digest_json }}
    steps:
      - name: Restore files hash cache
        id: cache
        uses: actions/cache@v4
        with:
          path: .files_hash.cache
          key: files-hash:${{ inputs.image_repo || github.repository }}:${{ github.ref_name }}

      - name: Read cached hash value
        id: read_cached_hash
        run: |
          if [ -f .files_hash.cache ]; then
            echo "cached_hash=$(cat .files_hash.cache)" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - uses: drupalforge/docker_publish_action@main
        id: publish
        with:
          dockerhub_username: ${{ secrets.dockerhub_username }}
          dockerhub_token: ${{ secrets.dockerhub_token }}
          image_repo: ${{ inputs.image_repo || github.repository }}
          files_to_hash: ${{ inputs.files_to_hash || null }}
          build_platform: ${{ matrix.arch }}
          cached_hash: ${{ steps.read_cached_hash.outputs.cached_hash || '' }}

      - name: Cancel workflow if hash unchanged
        if: steps.publish.outputs.files_hash == steps.read_cached_hash.outputs.cached_hash
        run: |
          echo "No changes detected. Cancelling workflow."
          gh run cancel ${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save new hash to cache file
        if: steps.publish.outputs.files_hash && steps.publish.outputs.files_hash != steps.read_cached_hash.outputs.cached_hash
        run: |
          echo "${{ steps.publish.outputs.files_hash }}" > .files_hash.cache
        shell: bash

      - name: Save hash to cache
        if: steps.publish.outputs.files_hash && steps.publish.outputs.files_hash != steps.read_cached_hash.outputs.cached_hash
        uses: actions/cache@v4
        with:
          path: .files_hash.cache
          key: files-hash:${{ inputs.image_repo || github.repository }}:${{ github.ref_name }}:${{ github.run_id }}:${{ github.run_attempt }}
          restore-keys: |
            files-hash:${{ inputs.image_repo || github.repository }}:${{ github.ref_name }}

  create-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Merge digests to JSON
        id: merge_digests
        run: |
          echo '${{ needs.build-and-push.outputs.digest_json_amd64 }}' > d1.json
          echo '${{ needs.build-and-push.outputs.digest_json_arm64 }}' > d2.json
          jq -s 'add' d1.json d2.json > digests.json
          cat digests.json
          echo "digests_json=$(cat digests.json)" >> $GITHUB_OUTPUT

      - uses: drupalforge/docker_publish_action@develop
        with:
          dockerhub_username: ${{ secrets.dockerhub_username }}
          dockerhub_token: ${{ secrets.dockerhub_token }}
          image_repo: ${{ inputs.image_repo || github.repository }}
          manifest_digests: ${{ steps.merge_digests.outputs.digests_json }}
