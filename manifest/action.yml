name: 'Drupal Forge publish image manifest'
description: 'Pushes an image manifest to Docker Hub for a Drupal Forge template.'
author: 'Drupal Forge'
branding:
  icon: 'package'
  color: 'blue'
inputs:
  dockerhub_username:
    description: 'Docker Hub username'
    required: true
  dockerhub_token:
    description: 'Docker Hub token'
    required: true
  image_repo:
    description: 'Docker Hub image repository'
    required: false
  manifest_digests:
    description: 'JSON map of platform labels to digests for manifest creation.'
    required: false
runs:
  using: "composite"
  steps:
    - name: Check if manifest_digests is set and complete
      env:
        DIGESTS_JSON: inputs.manifest_digests
      run: |
        PLATFORMS=$(echo "$DIGESTS_JSON" | jq -r 'keys[]')
        for REQ in $PLATFORMS; do
          if ! echo "$PLATFORMS" | grep -q "^$REQ$"; then
            echo "Missing digest for $REQ, skipping manifest build."
            exit 0
          fi
        done
      shell: bash

    - name: Set IMAGE_REPO variable
      run: |
        echo "IMAGE_REPO=${{ inputs.image_repo || github.repository }}" >> $GITHUB_ENV
      shell: bash

    - name: Set tag to be pushed to Docker Hub
      run: |
        echo "TAGS='${{ github.ref_name }}'" >> $GITHUB_ENV
      shell: bash

    - name: Determine if the latest tag should be pushed to Docker Hub
      if: github.ref_name == github.event.repository.default_branch
      run: |
        echo "TAGS=${TAGS} latest" >> $GITHUB_ENV
      shell: bash

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Create and push manifest to Docker Hub
      env:
        DIGESTS_JSON: inputs.manifest_digests
        DOCKER_CLI_EXPERIMENTAL: enabled
      run: |
        for TAG in $TAGS; do
          echo "Creating manifest for tag: $TAG"
          CREATE_CMD="docker manifest create $IMAGE_REPO:$TAG"
          for DIGEST in $(echo "$DIGESTS_JSON" | jq -r '.[]'); do
            CREATE_CMD="$CREATE_CMD --amend $IMAGE_REPO@$DIGEST"
          done
          echo "$CREATE_CMD"
          eval $CREATE_CMD
          docker manifest push $IMAGE_REPO:$TAG
        done
      shell: bash
